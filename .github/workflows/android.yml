name: Build SmartEyeX APK

# Trigger workflow setiap ada push ke branch main
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout kode dari repo
      - name: Checkout Repo
        uses: actions/checkout@v3

      # Setup Node.js versi 20 (Desember 2025)
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      # Install dependencies npm
      - name: Install Dependencies
        run: npm install

      # Install Capacitor CLI global
      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      # Tambah platform Android
      - name: Add Android Platform
        run: npx cap add android

      # Sinkronisasi proyek web ke platform Android
      - name: Sync Capacitor
        run: npx cap sync android

      # Build APK release
      - name: Build APK
        run: ./android/gradlew assembleRelease

      # Upload APK sebagai artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SmartEyeX-APK
          path: android/app/build/outputs/apk/release/app-release.apk
